<!DOCTYPE html>
<html>
<head>
    <title>Box Plot</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body class="chart-page">

    <div class="top-bar">
        <a href="HomePage.html" class="home-btn">← Back to Home</a>
    </div>

    <div class="header">
        <h1 class="chart-title">Extracurricular Activities vs Exam Score (Box Plot)</h1>
        <p>
            This chart compares exam score distributions based on extracurricular activities.
            Hover over a box to see summary statistics and click a category to focus on it.
        </p>
    </div>

    <div class="filter-container">
        <label for="motivationFilter">Filter by Motivation Level:</label>
        <select id="motivationFilter">
            <option value="All">All</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
    </div>

    <div class="chart-wrapper">
        <div class="card small-card">
            <div id="chart"></div>
        </div>

        <div id="chartInsight"></div>
    </div>

    <script src="JS/Boxplot.js"></script>

</body>
</html>
